<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Artificial Wisdom Guardrail Prompt</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <h1 id="appTitle">人工叡智ガードレールプロンプト</h1>
  <p id="notice" class="notice"></p>

  <section>
    <h2 id="languageTitle"></h2>
    <select id="languageSelect">
      <option value="auto">Auto / 自動</option>
      <option value="ja">日本語</option>
      <option value="en">English</option>
    </select>
    <p id="languageInfo" class="small"></p>
  </section>

  <section>
    <h2 id="previewTitle"></h2>
    <textarea id="preview" readonly></textarea>
    <button id="copyPrompt"></button>
  </section>

  <section class="statusBox">
    <h2>Status</h2>
    <p id="status">Ready.</p>
  </section>

  <section>
    <h2 id="discussionTitle"></h2>
    <button id="openDiscussions"></button>
    <p class="small">https://github.com/InchaComisho/Artificial-Wisdom-Guardrail-Protocol/discussions</p>
  </section>

  <section>
    <h2 id="privacyTitle"></h2>
    <ul id="privacyList"></ul>
  </section>

  <script src="sidepanel.js"></script>
</body>
</html>
